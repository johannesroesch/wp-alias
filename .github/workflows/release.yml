name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # 1. Tests auf der aktuellen PHP-Version durchführen
  # -----------------------------------------------------------------------
  test:
    name: Tests vor Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Tests ausführen
        run: ./vendor/bin/phpunit --no-progress

  # -----------------------------------------------------------------------
  # 2. WordPress Plugin Check
  # -----------------------------------------------------------------------
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: WordPress Plugin Check ausführen
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './'
          exclude-directories: 'vendor,tests,.github'
          exclude-files: '.gitignore'

  # -----------------------------------------------------------------------
  # 3. Produktions-ZIP bauen und GitHub-Release erstellen
  # -----------------------------------------------------------------------
  release:
    name: Release bauen & veröffentlichen
    runs-on: ubuntu-latest
    needs: [test, plugin-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version aus Tag ermitteln
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer in Plugin-Dateien einsetzen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^\( \* Version:\s*\).*/\1${VERSION}/" wp-alias.php
          sed -i "s/^define( 'WP_ALIAS_VERSION', '[^']*' );/define( 'WP_ALIAS_VERSION', '${VERSION}' );/" wp-alias.php

      - name: Produktions-ZIP erstellen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p build/wp-alias

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='tests/' \
            --exclude='vendor/' \
            --exclude='build/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpunit.xml' \
            --exclude='.gitignore' \
            --exclude='run-tests.php' \
            --exclude='test-results.*' \
            . build/wp-alias/

          cd build
          zip -r "../wp-alias-${VERSION}.zip" wp-alias/
          cd ..

          echo "ZIP: wp-alias-${VERSION}.zip ($(du -sh wp-alias-${VERSION}.zip | cut -f1))"

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: wp-alias-${{ steps.version.outputs.VERSION }}.zip
