name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: {}

jobs:
  # -----------------------------------------------------------------------
  # 1. Warten bis CI für denselben Commit erfolgreich abgeschlossen ist
  # -----------------------------------------------------------------------
  wait-for-ci:
    name: Warte auf CI
    runs-on: ubuntu-latest

    steps:
      - name: CI-Ergebnis des Commits prüfen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Warte auf CI für Commit $SHA ..."

          for i in $(seq 1 40); do
            JSON=$(gh api "repos/$REPO/actions/runs?head_sha=$SHA&event=push" 2>/dev/null)
            STATUS=$(echo "$JSON"     | jq -r '[.workflow_runs[] | select(.name == "CI")] | first | .status')
            CONCLUSION=$(echo "$JSON" | jq -r '[.workflow_runs[] | select(.name == "CI")] | first | .conclusion')

            echo "Versuch $i – Status: $STATUS / Conclusion: $CONCLUSION"

            if [ "$CONCLUSION" = "success" ]; then
              echo "CI erfolgreich."
              exit 0
            elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
              echo "CI fehlgeschlagen: $CONCLUSION"
              exit 1
            fi

            sleep 15
          done

          echo "Timeout: CI hat nicht rechtzeitig abgeschlossen."
          exit 1

  # -----------------------------------------------------------------------
  # 2. Produktions-ZIP bauen und GitHub-Release erstellen
  # -----------------------------------------------------------------------
  release:
    name: Release bauen & veröffentlichen
    runs-on: ubuntu-latest
    needs: [wait-for-ci]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Version aus Tag ermitteln
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer in Plugin-Dateien einsetzen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/^\( \* Version:\s*\).*/\1${VERSION}/" alias-manager.php
          sed -i "s/^define( 'ALIAS_MANAGER_VERSION', '[^']*' );/define( 'ALIAS_MANAGER_VERSION', '${VERSION}' );/" alias-manager.php

      - name: Produktions-ZIP erstellen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p build/alias-manager

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='tests/' \
            --exclude='vendor/' \
            --exclude='build/' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpunit.xml' \
            --exclude='.gitignore' \
            --exclude='run-tests.php' \
            --exclude='test-results.*' \
            --exclude='wp-alias.php' \
            --exclude='assets/' \
            . build/alias-manager/

          cd build
          zip -r "../alias-manager-${VERSION}.zip" alias-manager/
          cd ..

          echo "ZIP: alias-manager-${VERSION}.zip ($(du -sh alias-manager-${VERSION}.zip | cut -f1))"

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: alias-manager-${{ steps.version.outputs.VERSION }}.zip
